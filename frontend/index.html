<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA — PhD Agent</title>
<link rel="stylesheet" href="/css/style.css?v=20260418c">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="shell">

  <!-- Sidebar -->
  <nav class="side">
    <div class="logo">ARIA</div>
    <a class="nav" href="#" data-view="queue">
      <span class="dot amber"></span>Queue
      <span class="badge-nav hidden" id="nav-queue">0</span>
    </a>
    <a class="nav" href="#" data-view="positions">
      <span class="dot"></span>All Positions
    </a>
    <a class="nav" href="#" data-view="errors">
      <span class="dot red"></span>Errors
      <span class="badge-nav hidden" id="nav-errors">0</span>
    </a>
    <a class="nav" href="#" data-view="submitted">
      <span class="dot"></span>Submitted
    </a>
    <a class="nav" href="#" data-view="applicants">
      <span class="dot"></span>Applicants
    </a>
    <a class="nav" href="#" data-view="sources">
      <span class="dot"></span>Sources
    </a>
    <a class="nav" href="#" data-view="analytics">
      <span class="dot"></span>Analytics
    </a>
  </nav>

  <!-- Main -->
  <div class="main">

    <!-- Stats bar -->
    <div class="stats" id="stats-bar">
      <div class="stat">
        <div class="stat-n" id="stat-discovered">—</div>
        <div class="stat-l">Discovered</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="stat-matched">—</div>
        <div class="stat-l">Matched</div>
      </div>
      <div class="stat">
        <div class="stat-n amber" id="stat-ready">—</div>
        <div class="stat-l">Ready to Review</div>
      </div>
      <div class="stat">
        <div class="stat-n green" id="stat-submitted">—</div>
        <div class="stat-l">Submitted</div>
      </div>
      <div class="stat">
        <div class="stat-n red" id="stat-errors">—</div>
        <div class="stat-l">Errors</div>
      </div>
      <div class="stat" id="stat-gemini-wrap" title="Gemini 2.5 Flash token usage — input $0.30/M · output $2.50/M">
        <div class="stat-n" id="stat-gemini-n" style="font-size:18px">—</div>
        <div class="stat-l">Gemini Tokens</div>
        <div style="margin-top:3px;font-size:12px;font-weight:600;color:#7c5a08" id="stat-gemini-eur">€—</div>
      </div>
      <div class="stat" id="stat-serper-wrap" title="Serper.dev shared quota — used by ARIA + AdContact">
        <div class="stat-n" id="stat-serper-n">—</div>
        <div class="stat-l">Serper Queries</div>
        <div style="margin-top:4px;height:3px;background:#e4e2d8;border-radius:2px;overflow:hidden">
          <div id="stat-serper-bar" style="height:100%;background:#3b6d11;width:0%;transition:width .4s"></div>
        </div>
      </div>
    </div>

    <!-- Views -->
    <div id="view-queue"      class="view hidden"></div>
    <div id="view-positions"  class="view hidden"></div>
    <div id="view-errors"     class="view hidden"></div>
    <div id="view-submitted"  class="view hidden"></div>
    <div id="view-applicants" class="view hidden"></div>
    <div id="view-sources"    class="view hidden"></div>
    <div id="view-analytics"  class="view hidden"></div>

  </div>
</div>

<div id="toast" class="toast"></div>

<script src="/js/app.js?v=20260418c"></script>
<script src="/js/queue.js?v=20260418c"></script>
<script src="/js/positions.js?v=20260418c"></script>
<script src="/js/applicants.js?v=20260418c"></script>
<script src="/js/sources.js?v=20260418c"></script>
<script src="/js/analytics.js?v=20260418c"></script>
</body>
</html>
